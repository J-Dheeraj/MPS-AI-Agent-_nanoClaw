# nanoclaw.yaml — MPS-AI-Agent configuration
# Place at: ~/nanoclaw/nanoclaw.yaml

agent:
  name: assistant          # Change to MP's name or preferred agent name
  version: 2

# ---------------------------------------------------------------------------
# MCP servers — spawned by NanoClaw, available to all wired groups
# ---------------------------------------------------------------------------

mcp_servers:
  crm-bridge:
    type: stdio                              # NanoClaw spawns the process
    command: python3
    args:
      - ~/nanoclaw/mcp-crm-server.py
    env:
      CRM_BACKEND: sqlite                    # sqlite | google_sheets | rest_api | sharepoint | csv
      CRM_DATA_DIR: ~/nanoclaw/crm-data
      CRM_SQLITE_FILE: mps-cases.db
      # ── Google Sheets ──────────────────────────────────────────────────
      # CRM_BACKEND: google_sheets
      # CRM_GSHEET_ID: <spreadsheet-id-from-url>
      # CRM_GSHEET_CREDENTIALS: ~/nanoclaw/crm-data/gsheet-credentials.json
      #
      # ── REST API ───────────────────────────────────────────────────────
      # CRM_BACKEND: rest_api
      # CRM_REST_BASE_URL: https://your-crm.example.com/api/v1
      # CRM_REST_API_KEY: your-api-key
      # CRM_REST_API_HEADER: X-API-Key
      #
      # ── SharePoint ─────────────────────────────────────────────────────
      # CRM_BACKEND: sharepoint
      # CRM_SP_SITE_URL: https://yourorg.sharepoint.com/sites/MPS
      # CRM_SP_CLIENT_ID: <app-registration-client-id>
      # CRM_SP_CLIENT_SECRET: <app-registration-client-secret>
      # CRM_SP_LIST_NAME: MPS Cases
      #
      # ── CSV (read-only) ────────────────────────────────────────────────
      # CRM_BACKEND: csv
      # CRM_CSV_CASES: ~/nanoclaw/crm-data/cases.csv
      # CRM_CSV_LETTERS: ~/nanoclaw/crm-data/letters.csv

# ---------------------------------------------------------------------------
# Groups
# ---------------------------------------------------------------------------

groups:

  # ── Main group (MP's personal channel) ───────────────────────────────────
  main:
    role: owner                              # Full access — MP only
    claude_md: groups/main/CLAUDE.md         # Agent identity + policy knowledge
    elevated: true                           # Main group has elevated privileges
    mcp_servers:
      - crm-bridge                           # CRM tools available to MP

  # ── Volunteers group (intake team) ───────────────────────────────────────
  mps-volunteers:
    role: member                             # Can create cases + look up constituents
    claude_md: groups/main/CLAUDE.md         # Shares same policy knowledge base
    elevated: false
    mcp_servers:
      - crm-bridge                           # CRM tools available to volunteers too

  # ── Vetters group (review team) ──────────────────────────────────────────
  mps-vetters:
    role: member                             # Policy verification only — cannot create cases
    claude_md: groups/mps-vetters/CLAUDE.md  # Vetter-specific identity: verify, flag, improve
    elevated: false
    mcp_servers: []                          # No CRM access — vetters do not log cases

# ---------------------------------------------------------------------------
# Sender security — enforced before any message reaches the agent
# ---------------------------------------------------------------------------
# Configure allowed senders in: ~/.config/nanoclaw/sender-allowlist.json
# Default mode: drop — unknown senders are silently ignored and not stored.
#
# Example sender-allowlist.json:
# {
#   "defaultMode": "drop",
#   "groups": {
#     "main": {
#       "mode": "drop",
#       "allowedSenders": ["6591234567@s.whatsapp.net"]
#     },
#     "mps-volunteers": {
#       "mode": "drop",
#       "allowedSenders": [
#         "6591234567@s.whatsapp.net",
#         "6598765432@s.whatsapp.net"
#       ]
#     },
#     "mps-vetters": {
#       "mode": "drop",
#       "allowedSenders": [
#         "6591234567@s.whatsapp.net"
#       ]
#     }
#   }
# }

# ---------------------------------------------------------------------------
# Scheduler
# ---------------------------------------------------------------------------

scheduler:
  timezone: Asia/Singapore
  # Scheduled tasks are created via natural language commands in chat.
  # See groups/main/singapore-auto-update-tasks.md for the 10 task blocks.

# ---------------------------------------------------------------------------
# OneCLI Agent Vault proxy
# ---------------------------------------------------------------------------

onecli:
  port: 4891
  proxy_target: https://api.anthropic.com
  # API keys are stored in OneCLI vault — never in this file or any container.
  # Verify: docker inspect $(docker ps -q) | grep -i "sk-ant"
  # Expected: no output.

# ---------------------------------------------------------------------------
# Web UI
# ---------------------------------------------------------------------------

webui:
  host: 127.0.0.1            # Never change to 0.0.0.0 — localhost only
  port: 3080

# ---------------------------------------------------------------------------
# Mount allowlist
# ---------------------------------------------------------------------------
# Configure in: ~/.config/nanoclaw/mount-allowlist.json
# This file must live OUTSIDE the project directory.
# Containers can only mount paths on the allowlist.
# Never add ~ or /home as an allowed path.
