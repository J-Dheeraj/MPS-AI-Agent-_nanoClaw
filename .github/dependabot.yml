version: 2
updates:
  - package-ecosystem: pip
    directory: /mps_server
    schedule: {interval: weekly}
  - package-ecosystem: npm
    directory: /nanoclaw-tauri-client
    schedule: {interval: weekly}
  - package-ecosystem: cargo
    directory: /nanoclaw-tauri-client/src-tauri
    schedule: {interval: weekly}
