name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  server:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      SECRET_KEY: ci-only-secret-key-with-at-least-32-characters
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mps_server/requirements.txt
      - run: python -m pip install --disable-pip-version-check -r mps_server/requirements.txt pytest==8.2.2
      - run: python -m pip check
      - run: python -m compileall -q mps_server
      - run: python -m pytest -q
      - run: DATABASE_URL=sqlite:///migration-ci.db python -m alembic upgrade head
      - run: DATABASE_URL=sqlite:///migration-ci.db python -m alembic current

  desktop-frontend:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: nanoclaw-tauri-client/package-lock.json
      - run: npm ci
        working-directory: nanoclaw-tauri-client
      - run: npm run build
        working-directory: nanoclaw-tauri-client

  dependency-scan:
    name: Dependency vulnerability scan (V3-I6)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install pip-audit
        run: pip install --disable-pip-version-check pip-audit
      - name: Audit Python dependencies
        run: pip-audit -r mps_server/requirements.txt --strict --format json -o pip-audit.json
        continue-on-error: true
      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit.json
      - name: Generate SBOM (syft)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v1.0.0
          syft dir:mps_server --output cyclonedx-json=sbom-python.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-python
          path: sbom-python.json
      - name: Scan SBOM with Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin v0.74.0
          grype sbom:sbom-python.json --fail-on high --output json > grype-results.json || true
      - name: Upload Grype results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grype-results
          path: grype-results.json

  secret-scan:
    name: Secret scanning (V3-I6)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/zricethezav/gitleaks/releases/download/v8.21.0/gitleaks_8.21.0_linux_x64.tar.gz | tar xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source=. --verbose --exit-code 1
