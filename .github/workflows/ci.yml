name: CI

on:
  push:
    branches: [main]
    # v11: without this the v* release gate can never run — tag pushes did not
    # trigger the workflow at all (bug found while preparing the release drill).
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  server:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      SECRET_KEY: ci-only-secret-key-with-at-least-32-characters
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mps_server/requirements.txt
      - run: python -m pip install --disable-pip-version-check -r mps_server/requirements.txt pytest==8.2.2
      - run: python -m pip check
      - run: python -m compileall -q mps_server
      - run: python -m pytest -q
      - run: DATABASE_URL=sqlite:///migration-ci.db python -m alembic upgrade head
      - run: DATABASE_URL=sqlite:///migration-ci.db python -m alembic current

  desktop-frontend:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: nanoclaw-tauri-client/package-lock.json
      - run: npm ci
        working-directory: nanoclaw-tauri-client
      - run: npm run build
        working-directory: nanoclaw-tauri-client

  dependency-scan:
    name: Dependency vulnerability scan (V3-I6)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install pip-audit
        run: pip install --disable-pip-version-check pip-audit
      - name: Audit Python dependencies
        # Vulnerability findings fail CI (V4-I2): scanners are release gates,
        # not dashboards.
        run: pip-audit -r mps_server/requirements.txt --strict --format json -o pip-audit.json
      - name: Upload pip-audit results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pip-audit-results
          path: pip-audit.json
      - name: Generate SBOM (syft)
        run: |
          # v9: download the pinned installer and verify its sha256 before running
          # it (no unchecked curl|sh). Pinned to the v1.0.0 release script.
          curl -sSfL -o /tmp/syft-install.sh https://raw.githubusercontent.com/anchore/syft/v1.0.0/install.sh
          echo "39e6c5df8895b91e1b925af3f2ab1571c99140e88cfa472bd64bba5637319e67  /tmp/syft-install.sh" | sha256sum -c -
          sh /tmp/syft-install.sh -b /usr/local/bin v1.0.0
          syft dir:mps_server --output cyclonedx-json=sbom-python.json
      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-python
          path: sbom-python.json
      - name: Scan SBOM with Grype
        run: |
          # v9: download the pinned installer and verify its sha256 before running
          # it (no unchecked curl|sh). Pinned to the v0.114.0 release script.
          curl -sSfL -o /tmp/grype-install.sh https://raw.githubusercontent.com/anchore/grype/v0.114.0/install.sh
          echo "8646f06a90b10ca64992c1809b4aa00c44e30b4f551f63c309b0b0ab66873556  /tmp/grype-install.sh" | sha256sum -c -
          sh /tmp/grype-install.sh -b /usr/local/bin v0.114.0
          # v7 C4: fail closed. A fresh vulnerability DB is required; do NOT
          # disable age validation or swallow db-update failure, or a stale DB
          # would yield a green (but untrustworthy) scan. grype >=0.80 uses the
          # maintained DB v6 feed (the frozen schema-v5 feed used by <=0.77 is
          # ~14 weeks stale and always fails the 5-day age check).
          grype db update
          grype sbom:sbom-python.json --fail-on high --output json > grype-results.json
      - name: Upload Grype results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: grype-results
          path: grype-results.json

  pg-concurrency:
    name: PostgreSQL concurrency (v9)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    services:
      postgres:
        # v10: pinned by digest for a reproducible, integrity-verified service image
        image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mps_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - run: pip install --disable-pip-version-check -r mps_server/requirements.txt pytest
      - name: Run PostgreSQL concurrency suite (must not skip)
        env:
          # gated tests run for real here; a skip means the gate is invisible -> fail.
          TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/mps_test
        run: |
          set +e
          python -m pytest tests/test_pg_concurrency.py -q -rs | tee pg-out.txt
          rc=${PIPESTATUS[0]}
          set -e
          if grep -qiE 'skipped|no tests ran' pg-out.txt; then
            echo 'PostgreSQL concurrency gate was SKIPPED — failing build'; exit 1; fi
          if [ "$rc" -ne 0 ]; then echo 'PostgreSQL concurrency suite failed'; exit 1; fi
          echo 'PostgreSQL concurrency suite passed under real concurrency'

  secret-scan:
    name: Secret scanning (V3-I6)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          # v10: download + verify sha256 before extracting (no unchecked curl|tar).
          curl -sSfL -o /tmp/gitleaks.tar.gz https://github.com/zricethezav/gitleaks/releases/download/v8.21.0/gitleaks_8.21.0_linux_x64.tar.gz
          echo "6c3a240509647225997d31df06e872350e1c0fe2fb85d323ae29a9fef0012586  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar xz -C /usr/local/bin gitleaks -f /tmp/gitleaks.tar.gz
      - name: Run gitleaks
        run: gitleaks detect --source=. --verbose --exit-code 1

  prometheus-rules:
    name: Validate Prometheus alert rules
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install promtool (checksum-verified, pinned)
        run: |
          curl -sSfL -o /tmp/prom.tar.gz https://github.com/prometheus/prometheus/releases/download/v2.54.1/prometheus-2.54.1.linux-amd64.tar.gz
          echo "31715ef65e8a898d0f97c8c08c03b6b9afe485ac84e1698bcfec90fc6e62924f  /tmp/prom.tar.gz" | sha256sum -c -
          tar xzf /tmp/prom.tar.gz -C /tmp
          sudo install /tmp/prometheus-2.54.1.linux-amd64/promtool /usr/local/bin/promtool
      - name: promtool check rules
        run: promtool check rules deploy/monitoring/alerts.yml

  release-record:
    name: Release record (signed + verified on v* tags)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - run: pip install --disable-pip-version-check -r mps_server/requirements.txt pip-audit
      - name: Record dependency-audit status (non-gating; dependency-scan is the gate)
        run: pip-audit -r mps_server/requirements.txt --format json -o pip-audit.json || true
      - name: Generate release record
        run: python3 deploy/release/generate_release_record.py --pip-audit pip-audit.json --out release-record.json
      - name: Enforce eval + signing + completeness on release tags
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_SIGNING_KEY_PEM: ${{ secrets.RELEASE_SIGNING_KEY_PEM }}
          # v11 (review Important#1): first-class release inputs. Production
          # points these repo variables at the active signed policy manifest dir
          # and the prod-model eval output; the drill uses deploy/release/drill/.
          POLICY_DIR: ${{ vars.RELEASE_POLICY_DIR }}
          RELEASE_EVAL_PATH: ${{ vars.RELEASE_EVAL_PATH }}
        # Fail-closed release gate (2026-07-02 review Critical#2 + Important#5):
        # a v* release must carry a model-eval result, be Ed25519-signed, and
        # have no null governance fields. The secret holds the PEM content; it
        # is written to a runner-local file because the generator takes a path.
        run: |
          if [ -n "$RELEASE_SIGNING_KEY_PEM" ]; then
            umask 077
            printf '%s' "$RELEASE_SIGNING_KEY_PEM" > /tmp/release-signing-key.pem
            export RELEASE_SIGNING_KEY=/tmp/release-signing-key.pem
          fi
          python3 deploy/release/generate_release_record.py --pip-audit pip-audit.json --out release-record.json --eval-result "${RELEASE_EVAL_PATH:-eval.json}" --require-eval --require-signed --require-complete
      - name: Verify release-record signature (when present)
        if: always()
        env:
          RELEASE_PUBLIC_KEY_PEM: ${{ secrets.RELEASE_PUBLIC_KEY_PEM }}
        # Independent verification in CI (Critical#2): a signed record that
        # cannot be verified fails the job — signing cannot become ceremonial.
        run: |
          if [ -f release-record.json.sig ]; then
            printf '%s' "$RELEASE_PUBLIC_KEY_PEM" > /tmp/release-pub.pem
            export RELEASE_PUBLIC_KEY=/tmp/release-pub.pem
            python3 deploy/release/verify_release_record.py release-record.json
          else
            echo "no signature present (unsigned push build) — skipping verification"
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: release-record
          path: |
            release-record.json
            release-record.json.sig
          if-no-files-found: warn

  model-evals:
    # C4: model-executed evaluation gate. GitHub-hosted runners have no Ollama,
    # so this runs only on manual dispatch (use a self-hosted runner with the
    # deployed model, or run 
    # on the model host). It exits non-zero if any safety threshold is breached.
    name: Model evaluation (C4)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - run: pip install -r mps_server/requirements.txt
      - name: Run model evaluations
        env:
          RUN_MODEL_EVALS: "1"
          OLLAMA_URL: ${{ vars.OLLAMA_URL }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
        run: python -m mps_server.evals.run_evals
