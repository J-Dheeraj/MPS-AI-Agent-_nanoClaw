global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: mps-server
    metrics_path: /metrics
    bearer_token_file: /run/secrets/metrics_token
    static_configs:
      - targets: ["server:8000"]
