name: mps-agent

services:
  postgres:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_DB: mps
      POSTGRES_USER: mps
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mps -d mps"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt: ["no-new-privileges:true"]

  ollama:
    image: ${OLLAMA_IMAGE}
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks: [backend]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 10
    security_opt: ["no-new-privileges:true"]

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE}
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment: &server_environment
      ENVIRONMENT: production
      DB_HOST: postgres
      DB_NAME: mps
      DB_USER: mps
      DB_PASSWORD_FILE: /run/secrets/db_password
      SECRET_KEY_FILE: /run/secrets/jwt_secret
      METRICS_TOKEN_FILE: /run/secrets/metrics_token
      BOOTSTRAP_ADMIN_PASSWORD_FILE: /run/secrets/bootstrap_admin_password
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      POLICY_DIR: /app/policy/active
      ALLOWED_ORIGINS: https://${MPS_HOST}
      TRUSTED_HOSTS: ${MPS_HOST},localhost,127.0.0.1,server
      TLS_TERMINATED_BY_PROXY: "true"
      FORCE_HTTPS: "false"
      LOG_FORMAT: json
      ALLOW_SIGNUP: "false"
      # Ed25519 public key for verifying signed policy manifests (V3-C3 / V-C1).
      # Points directly at the Docker secret path so no extra volume mount is needed.
      POLICY_PUBLIC_KEY: /run/secrets/policy_public_key
      # External audit anchor (V-H9/V4-C2): a dedicated writable volume on the
      # otherwise read-only server container.
      AUDIT_CHECKPOINT_FILE: /audit/audit_checkpoint.log
      # C5: sign each checkpoint head so a host admin who can write the volume
      # still cannot forge a consistent anchor without the key. INFRA NOTE: the
      # /audit volume below is a local Docker volume — for true non-repudiation
      # mount a WORM/remote append-only store and/or set
      # AUDIT_CHECKPOINT_FORWARD_URL to an external immutable sink.
      AUDIT_CHECKPOINT_SIGNING_KEY: /run/secrets/audit_checkpoint_key
      AUDIT_CHECKPOINT_PUBLIC_KEY: /run/secrets/audit_checkpoint_pub
      # v6 I#1: MANDATORY in production. The server refuses to start if this is
      # unset while ENVIRONMENT=production. Heads are queued in a durable outbox
      # and delivered with retries; supply a bearer token and/or client cert for
      # authenticated transport to the external append-only sink.
      AUDIT_CHECKPOINT_FORWARD_URL: ${AUDIT_CHECKPOINT_FORWARD_URL:?set to the external append-only audit sink}
      # v7: restrict the audit sink to an approved host set (SSRF/exfil guard).
      # Comma-separated host[:port]; startup refuses a non-allowlisted URL.
      AUDIT_CHECKPOINT_FORWARD_ALLOWED_HOSTS: ${AUDIT_CHECKPOINT_FORWARD_ALLOWED_HOSTS:?set to the allowlisted audit sink host(s)}
      AUDIT_CHECKPOINT_FORWARD_TOKEN: /run/secrets/audit_forward_token
      AUDIT_CHECKPOINT_FORWARD_CLIENT_CERT: /run/secrets/audit_forward_client_cert
      AUDIT_CHECKPOINT_FORWARD_CLIENT_KEY: /run/secrets/audit_forward_client_key
    secrets: [db_password, jwt_secret, metrics_token, bootstrap_admin_password, policy_public_key, audit_checkpoint_key, audit_checkpoint_pub, audit_forward_token, audit_forward_client_cert, audit_forward_client_key]
    networks: [backend]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE}
    restart: unless-stopped
    environment: *server_environment
    secrets: [db_password, jwt_secret, metrics_token, bootstrap_admin_password, policy_public_key, audit_checkpoint_key, audit_checkpoint_pub]
    networks: [backend]
    depends_on:
      migrate:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy
    read_only: true
    volumes:
      - audit_checkpoint:/audit
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  caddy:
    image: ${CADDY_IMAGE}
    restart: unless-stopped
    environment:
      MPS_HOST: ${MPS_HOST}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [edge, backend]
    depends_on:
      server:
        condition: service_healthy
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]

  prometheus:
    image: ${PROMETHEUS_IMAGE}
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    secrets: [metrics_token]
    networks: [backend]
    depends_on:
      server:
        condition: service_healthy
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]

  alertmanager:
    image: ${ALERTMANAGER_IMAGE}
    restart: unless-stopped
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    secrets: [alert_webhook_url]
    networks: [backend]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]

secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  metrics_token:
    file: ./secrets/metrics_token.txt
  bootstrap_admin_password:
    file: ./secrets/bootstrap_admin_password.txt
  alert_webhook_url:
    file: ./secrets/alert_webhook_url.txt
  policy_public_key:
    file: ./secrets/policy_public_key.pem
  audit_checkpoint_key:
    file: ./secrets/audit_checkpoint_key.pem
  audit_checkpoint_pub:
    file: ./secrets/audit_checkpoint_pub.pem
  audit_forward_token:
    file: ./secrets/audit_forward_token.txt
  audit_forward_client_cert:
    file: ./secrets/audit_forward_client_cert.pem
  audit_forward_client_key:
    file: ./secrets/audit_forward_client_key.pem

networks:
  edge: {}
  backend:
    internal: true

volumes:
  audit_checkpoint: {}
  postgres_data: {}
  ollama_data: {}
  caddy_data: {}
  caddy_config: {}
  prometheus_data: {}
  alertmanager_data: {}
